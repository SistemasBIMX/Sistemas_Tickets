<div class="container">
<h1>Registro de Solicitud</h1>
<h3>Solicitante:</h3>
<input type="text" id="solicitante1" disabled>

<h3>Prioridad:</h3>
<div class="radio-group">
<label><input type="radio" name="urgente" value="Alta"> Alta</label><br>
<label><input type="radio" name="urgente" value="Media"> Media</label><br>
<label><input type="radio" name="urgente" value="Baja"> Baja</label>
</div>

<h3>Tema:</h3>
<select id="origen" required>
<option value="">Seleccione una opción</option>
<option value="Soporte">Soporte</option>
<option value="Drive">Drive</option>
<option value="SAP">SAP</option>
<option value="Internet">Internet</option>
<option value="Respaldos">Respaldos</option>
<option value="Control de accesos">Control de accesos</option>
<option value="Camaras">Camaras</option>
<option value="Otros">Otros</option>
</select>

<h3>Observaciones del solicitante:</h3>
<input type="text" id="obs_solicitante1" onblur="this.value = capitalizarOracion(this.value)">

<p id="mensaje" style="text-align:center; font-weight:bold;"></p>
<div class="botones">
<center>
<button id="btnGuardar" onclick="guardar()">Enviar</button>
</div>
</div></center>

<div id="logoutModal" class="modal">
  <div class="modal-content">
    <h3>⚠️ Cerrar sesión</h3>
    <p>¿Seguro que deseas salir?</p>

    <div style="margin-top:15px;">
      <button onclick="confirmarLogout()" style="background:#dc3545;color:white;">Sí, salir</button>
      <button onclick="cerrarLogout()" style="margin-left:10px;">Cancelar</button>
    </div>
  </div>
</div>

<script src="sistemas.js" defer></script>
</body>
</html>
